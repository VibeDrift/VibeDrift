# gitleaks configuration for VibeDrift.
#
# Extends the default ruleset and allowlists files that intentionally contain
# credential-shaped strings but hold no real secrets: the security analyzer's
# synthetic test fixtures and the .env.example placeholder template. Everything
# else is scanned with the full default ruleset.

title = "VibeDrift gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Synthetic security-test fixtures and placeholder templates (verified: no real secrets)"
paths = [
  '''test/unit/analyzers/security\.test\.ts''',
  '''test/unit/analyzers/security-floor\.test\.ts''',
  '''test/calibration/injectors\.ts''',
  # Drift Sessions tests: synthetic credential fixtures for the secret masker /
  # prompt normalizer / hook (verified: no real secrets — dummy api_key=, PEM,
  # and provider-key shapes used only to prove the masker catches them).
  '''test/unit/session/mask\.test\.ts''',
  '''test/unit/session/normalize\.test\.ts''',
  '''test/unit/session/decision\.test\.ts''',
  '''test/unit/session/upload-schema\.test\.ts''',
  '''test/integration/session-hook\.test\.ts''',
  '''\.env\.example$''',
  '''docs/handbook/.*\.md''',
]
