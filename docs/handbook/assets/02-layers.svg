<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" width="880" height="470" role="img" aria-label="The three analysis layers and where they run">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9aa3af"/>
    </marker>
  </defs>

  <!-- Local group -->
  <rect x="20" y="45" width="440" height="360" fill="none" stroke="#9aa3af" stroke-dasharray="6 4" rx="8"/>
  <text x="32" y="34" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#e8eaed">Your machine · local · free</text>

  <!-- Layer 1 -->
  <rect x="40" y="70" width="400" height="95" fill="#12151a" stroke="#eab308" rx="6"/>
  <text x="56" y="94" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#eab308">Layer 1 · per-file + cross-file</text>
  <text x="56" y="118" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#e8eaed">src/analyzers · 13 static analyzers</text>
  <text x="56" y="138" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#e8eaed">src/drift · 14 detectors (dominance vote)</text>

  <line x1="240" y1="165" x2="240" y2="193" stroke="#9aa3af" marker-end="url(#arr)"/>

  <!-- Layer 1.7 -->
  <rect x="40" y="197" width="400" height="80" fill="#12151a" stroke="#eab308" rx="6"/>
  <text x="56" y="221" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#eab308">Layer 1.7 · Code DNA · src/codedna</text>
  <text x="56" y="243" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#e8eaed">fingerprints · MinHash/LSH near-dups</text>
  <text x="56" y="263" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#e8eaed">op sequences · taint · deviation</text>

  <line x1="240" y1="277" x2="240" y2="305" stroke="#9aa3af" marker-end="url(#arr)"/>

  <!-- Scoring / output -->
  <rect x="40" y="309" width="400" height="80" fill="#12151a" stroke="#eab308" rx="6"/>
  <text x="56" y="333" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#eab308">src/scoring · findings → scores</text>
  <text x="56" y="355" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#e8eaed">Vibe Drift Score + Hygiene Score</text>
  <text x="56" y="375" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#e8eaed">src/output · terminal html json csv docx</text>

  <!-- Cloud group -->
  <rect x="640" y="45" width="220" height="245" fill="none" stroke="#9aa3af" stroke-dasharray="6 4" rx="8"/>
  <text x="652" y="34" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#e8eaed">Hosted service · cloud</text>

  <rect x="656" y="115" width="188" height="130" fill="#12151a" stroke="#eab308" rx="6"/>
  <text x="670" y="141" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#eab308">Layer 2 · deep scan</text>
  <text x="670" y="165" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#e8eaed">optional · metered</text>
  <text x="670" y="185" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#e8eaed">embeddings + LLM</text>
  <text x="670" y="205" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#e8eaed">validation, both</text>
  <text x="670" y="225" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#e8eaed">server-side</text>

  <!-- Cross-boundary arrows -->
  <line x1="460" y1="170" x2="638" y2="170" stroke="#9aa3af" marker-end="url(#arr)"/>
  <text x="550" y="156" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#e8eaed">--deep · snippets only</text>

  <line x1="656" y1="230" x2="462" y2="230" stroke="#9aa3af" marker-end="url(#arr)"/>
  <text x="550" y="252" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#e8eaed">merge at ≥0.85 conf</text>

  <!-- Caption -->
  <text x="20" y="435" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#9aa3af">A deep scan sends at most 30 function snippets of at most 60 lines each, never full files.</text>
  <text x="20" y="455" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#9aa3af">Layers 1 and 1.7 analyze entirely on your machine; deep scan failures degrade to the local result.</text>
</svg>
